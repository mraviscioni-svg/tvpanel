<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <title>Promociones · Modo Mundial</title>
  <meta name="theme-color" content="#04121f">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;800;900&display=swap" rel="stylesheet">
  <link rel="icon" href="/IMG/Logo.png">
  <link rel="stylesheet" href="CSS/style-promociones-mundial.css?v=7">
  <link id="theme-css" rel="stylesheet" href="CSS/themes/mundialista.css?v=1">
</head>
<body>
  <div class="tv-frame">
    <div class="stadium-lights" aria-hidden="true"><span></span><span></span></div>

    <header class="top-bar">
      <div class="header-hero">
        <img class="brand-logo" src="/IMG/Logo.png" alt="Estancia" onerror="this.style.display='none'">
        <span class="header-sep" aria-hidden="true">–</span>
        <div class="arg-cheer">
          <span class="arg-cheer-line">
            <span class="arg-star-group" aria-hidden="true">★★★</span>
            <span class="arg-cheer-text">Vamos Argentina</span>
            <span class="arg-star-group" aria-hidden="true">★★★</span>
          </span>
        </div>
        <span class="header-sep" aria-hidden="true">–</span>
        <span class="mundial-badge">Mundial 2026</span>
      </div>
      <div class="header-date">
        <span id="ticker-mode-label">Hoy</span>
        <span id="today-date">—</span>
      </div>
      <div class="fixtures-ticker">
        <div class="fixtures-track" id="fixtures-track">
          <span class="fixture-chip fixture-loading">Cargando partidos…</span>
        </div>
      </div>
    </header>

    <div class="main-area">
      <section class="promo-stage">
        <div class="arg-flag-drape" aria-hidden="true">
          <svg viewBox="0 0 160 200" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="">
            <defs>
              <clipPath id="argFlagDrapeShape">
                <path d="M160 0 L160 198 Q 95 145 28 42 L160 0 Z"/>
              </clipPath>
              <linearGradient id="flagFold" x1="0" y1="0" x2="1" y2="1">
                <stop offset="0%" stop-color="#fff" stop-opacity=".22"/>
                <stop offset="100%" stop-color="#000" stop-opacity=".18"/>
              </linearGradient>
            </defs>
            <g clip-path="url(#argFlagDrapeShape)">
              <rect width="160" height="66.7" fill="#74ACDF"/>
              <rect y="66.7" width="160" height="66.6" fill="#FFFFFF"/>
              <rect y="133.3" width="160" height="66.7" fill="#74ACDF"/>
              <circle cx="80" cy="100" r="17" fill="#F6B40E" stroke="#85340B" stroke-width="1.2"/>
              <g fill="#85340B" stroke="#85340B" stroke-width=".8">
                <path d="M80 78 L82 88 L80 86 L78 88 Z"/>
                <path d="M80 122 L82 112 L80 114 L78 112 Z"/>
                <path d="M58 100 L68 98 L66 100 L68 102 Z"/>
                <path d="M102 100 L92 98 L94 100 L92 102 Z"/>
                <path d="M65 83 L73 90 L71 91 L69 88 Z"/>
                <path d="M95 117 L87 110 L89 109 L91 112 Z"/>
                <path d="M95 83 L87 90 L89 91 L91 88 Z"/>
                <path d="M65 117 L73 110 L71 109 L69 112 Z"/>
              </g>
              <rect width="160" height="200" fill="url(#flagFold)"/>
            </g>
            <path d="M160 0 L160 198 Q 95 145 28 42" fill="none" stroke="rgba(255,255,255,.35)" stroke-width="1.5"/>
          </svg>
        </div>
        <div class="promo-corners" aria-hidden="true"><span></span><span></span><span></span><span></span></div>
        <div id="carousel"></div>
      </section>

      <aside class="side-panel" id="match-panel">
        <div class="side-card match-card">
          <div class="match-card-left">
            <h3 id="match-title">Próximo · Argentina</h3>
            <div class="match-teams" id="match-teams">—</div>
            <div class="match-meta" id="match-meta">—</div>
          </div>
          <div class="countdown" id="match-countdown">—</div>
        </div>
      </aside>
    </div>

    <div class="bottom-strip" aria-hidden="true"></div>
  </div>

  <script src="JS/live-json-sync.js?v=4"></script>
  <script src="JS/script-promociones-mundial.js?v=1"></script>
</body>
</html>
