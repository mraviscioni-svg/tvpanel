<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
<title>Estancia Cardoso | Lista de Precios</title>
<meta name="theme-color" content="#0a1628" />
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@500;600;700;800;900&display=swap" rel="stylesheet">
<link rel="stylesheet" href="CSS/styles.css?v=4">
<link rel="stylesheet" href="CSS/themes/mundialista.css?v=2">
<link rel="stylesheet" href="CSS/style-index2-mundial-v3.css?v=8">
<link rel="icon" href="IMG/IsoLogo.png">
</head>
<body class="index2-mundial promo-v3">
<div class="tv-frame">
  <div class="stadium-lights" aria-hidden="true"><span></span><span></span></div>

  <div class="app">
    <header class="top-bar">
      <div class="header-hero">
        <div class="brand"><img src="IMG/Logo.png" alt="Estancia Cardoso"></div>
        <div class="arg-cheer">
          <span class="arg-cheer-line">
            <span class="arg-star-group" aria-hidden="true">★★★</span>
            <span class="arg-cheer-text">Vamos Argentina</span>
            <span class="arg-star-group" aria-hidden="true">★★★</span>
          </span>
        </div>
        <div class="clock header-date" id="clock">
          <div class="clock-date header-date-day">—</div>
          <div class="clock-time header-date-time">
            <span class="hm">--:--</span><span class="ampm">AM</span>
          </div>
        </div>
      </div>
    </header>

    <section class="mundial-fixtures" aria-label="Partidos del día">
      <div class="fixtures-bar">
        <div class="fixtures-heading">
          <span class="fixtures-heading-icon" aria-hidden="true">⚽</span>
          <span class="fixtures-heading-mundial">Mundial 2026</span>
          <span class="fixtures-heading-sep" aria-hidden="true">·</span>
          <span class="fixtures-heading-text" id="fixtures-heading-text">Partidos de hoy</span>
        </div>
        <div class="fixtures-ticker">
          <div class="fixtures-track" id="fixtures-track">
            <span class="fixture-chip fixture-loading">Cargando partidos…</span>
          </div>
        </div>
      </div>
    </section>

    <main id="mainLayout" class="layout image-right main-area">
      <section class="menu promo-stage" aria-label="Listado">
        <video class="bg-video" id="bgVideo" autoplay muted loop playsinline preload="metadata" poster="IMG/fondo-carniceria.jpg">
          <source src="VIDEO/fondo-carniceria.mp4" type="video/mp4"/>
        </video>

        <div class="menu-header">
          <h2>Lista de Precios</h2>
          <div class="badge">HOY</div>
        </div>

        <div class="menu-body" id="menuBody">
          <div class="menu-inner" id="menuInner">
            <div class="columns" id="columns"></div>
          </div>
        </div>
      </section>

      <section class="right promo-panel" aria-label="Destacados" id="rightPanel">
        <div id="tv-carousel-refresh" class="tv-data-refresh tv-data-refresh--panel" aria-live="polite" aria-hidden="true">
          <div class="tv-data-refresh-card">
            <div class="tv-data-refresh-spinner" aria-hidden="true"></div>
            <p class="tv-data-refresh-msg">Cargando imágenes…</p>
          </div>
        </div>
      </section>
    </main>

    <footer>
      <div class="footer-box" id="footerBox">
        <div class="footer-viewport">
          <div class="footer-track" id="footerTrack">
            <div class="footer-slide">
              <span class="foot-title">Aceptamos estos métodos de pago</span>
              <div class="pay-logos">
                <img src="IMG/pagos/visa.png" alt="Visa">
                <img src="IMG/pagos/mastercard.png" alt="Mastercard">
                <img src="IMG/pagos/amex.png" alt="Amex">
                <img src="IMG/pagos/mercadopago.png" alt="Mercado Pago">
                <img src="IMG/pagos/debito.png" alt="Débito">
                <img src="IMG/pagos/efectivo.png" alt="Efectivo">
              </div>
            </div>
            <div class="footer-slide">
              <div class="qr"><img src="IMG/qrcode.jpg" width="100%" alt="QR"></div>
              <div class="whatsapp">
                <svg viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M20 3.9A10 10 0 0 0 3.5 17.7L2 22l4.4-1.4A10 10 0 1 0 20 3.9ZM12 20a8 8 0 0 1-4.1-1.2l-.3-.2-2.7.9.9-2.6-.2-.3A8 8 0 1 1 12 20Zm4.9-5.8c-.3-.2-1.7-.8-2-.9s-.5-.2-.7.2-.8.9-1 .9-.4 0-.7-.2a6.3 6.3 0 0 1-2-1.2 7.5 7.5 0 0 1-1.4-1.8c-.1-.3 0-.5.2-.7l.5-.6.2-.6-.1-.6c0-.2-.7-1.8-1-2.4s-.5-.6-.7-.6h-.6a1.2 1.2 0 0 0-.9.4 3.6 3.6 0 0 0-1.1 2.6 6.2 6.2 0 0 0 1.3 3.2 14.1 14.1 0 0 0 5.4 4.9c.6.3 1.2.5 1.8.6.6.2 1.2.1 1.7.1a2.9 2.9 0 0 0 2-1.3c.2-.4.2-1 .1-1.2s-.3-.2-.6-.4Z"/></svg>
                <a id="waLink" href="#" style="text-decoration:none">Hacé tu pedido por WhatsApp</a>
                <span id="waNumber" style="opacity:.8"></span>
              </div>
            </div>
          </div>
        </div>
      </div>
    </footer>
  </div>

  <div class="bottom-strip" aria-hidden="true"></div>
</div>

<script>
(function(){
  const p = new URL(location).searchParams;
  const num = (v, def, min=null, max=null) => {
    let n = parseInt(v ?? def, 10);
    if (Number.isNaN(n)) n = def;
    if (min != null) n = Math.max(min, n);
    if (max != null) n = Math.min(max, n);
    return n;
  };

  window.APP_CONFIG = {
    cols:               num(p.get('cols'), 3, 1, 6),
    productsPerColumn:  num(p.get('ppc'), 10, 1, 50),
    startIndex:         num(p.get('start'), 0, 0),
    productsPerPage:    num(p.get('ppp'), 30, 1, 500),
    jsonPath:           p.get('j') || 'JSON/productos.json',
    side:               (p.get('side')||'').toLowerCase(),
    carouselJson:       p.get('cj') || 'JSON/congelados-img.json',
    carouselStacks:     num(p.get('stacks'), 2, 1, 3),
    carouselInterval:   num(p.get('cint'), 6000, 2500, 60000),
    theme:              'mundialista',
    palette:            (p.get('palette')||'').toLowerCase(),
    snow:               p.get('snow') === '1'
  };
})();
</script>

<script src="JS/live-json-sync.js?v=4"></script>
<script src="JS/script-mundial-fixtures.js?v=2"></script>
<script src="JS/app.js?v=20260529"></script>

<div class="snow" aria-hidden="true"></div>
<div id="tv-data-refresh" class="tv-data-refresh" aria-live="polite" aria-hidden="true">
  <div class="tv-data-refresh-card">
    <div class="tv-data-refresh-spinner" aria-hidden="true"></div>
    <p class="tv-data-refresh-msg">Cargando precios…</p>
  </div>
</div>
</body>
</html>
