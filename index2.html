<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Estancia Cardoso | Lista de Precios</title>

<!-- Fuentes + estilos base -->
<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="CSS/styles.css">

<!-- Theme base (app.js puede cambiar este href según el tema) -->
<link id="theme-css" rel="stylesheet" href="CSS/themes/default.css?v=1">
<script>
(function ThemeLoader(){
  const p = new URL(location).searchParams;
  const saved = localStorage.getItem('ec_theme');
  const theme = (p.get('theme') || saved || 'default').replace(/[^a-z0-9._-]/gi,'');
  const paletteParam = (p.get('palette')||"").toLowerCase(); // opcional
  const allowed = new Set(['','rojo','verde','oro']);
  const palette = allowed.has(paletteParam) ? paletteParam : '';

  const link = document.getElementById('theme-css');
  const bust = `v=${Date.now()}`; // fuerza recarga
  link.href = `CSS/themes/${theme}.css?${bust}`;
  link.onerror = () => { if(theme!=='default'){ link.href=`CSS/themes/default.css?${bust}`; } };

  document.documentElement.setAttribute('data-palette', palette);
  localStorage.setItem('ec_theme', theme);
})();
</script>
<link rel="icon" href="IMG/IsoLogo.png">
</head>
<body>

<!-- CONFIG: SOLO configuración (el resto lo maneja JS/app.js) -->
<script>
(function(){
  const p = new URL(location).searchParams;

  // Helpers numéricos con fallback
  const num = (v, def, min=null, max=null) => {
    let n = parseInt(v ?? def, 10);
    if (Number.isNaN(n)) n = def;
    if (min != null) n = Math.max(min, n);
    if (max != null) n = Math.min(max, n);
    return n;
  };

  // Config visible para app.js
  window.APP_CONFIG = {
    /* Productos / grilla */
    cols:               num(p.get('cols'), 3, 1, 6),
    productsPerColumn:  num(p.get('ppc'), 10, 1, 50),
    startIndex:         num(p.get('start'), 0, 0),
    productsPerPage:    num(p.get('ppp'), 30, 1, 500),
    jsonPath:           p.get('j') || 'JSON/productos.json',

    /* Lado de imagen (right|left). app.js puede leer esto o usar ?side=left */
    side:               (p.get('side')||'').toLowerCase(), // 'left' | 'right' | ''

    /* Carrusel (1..3 stacks) */
    carouselJson:       p.get('cj') || 'JSON/carrusel.json',
    carouselStacks:     num(p.get('stacks'), 2, 1, 3),
    carouselInterval:   num(p.get('cint'), 5000, 2500, 60000),

    /* Theme (app.js se encarga de aplicarlo) */
    theme:              p.get('theme')   || localStorage.getItem('ec_theme') || 'default',
    palette:            (p.get('palette')||'').toLowerCase(),  // '', 'rojo', 'verde', 'oro'
    snow:               p.get('snow') === '1'
  };
})();
</script>

<!-- Lógica completa en app.js -->
<script src="JS/app.js?v=20251104"></script>

<!-- Capa de nieve (si snow=1, app.js la animará) -->
<div class="snow" aria-hidden="true"></div>
</body>
