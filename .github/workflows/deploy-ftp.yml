# Deploy a GitHub (push) y al hosting por FTP
# Configurá los secretos en el repo: FTP_SERVER, FTP_USERNAME, FTP_PASSWORD, FTP_SERVER_DIR
# Ver DEPLOY-GITHUB-Y-FTP.md

name: Deploy to FTP

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Remove .git and data (no subir al FTP)
        run: |
          rm -rf .git
          rm -rf data

      - name: Listar qué se va a subir (debug)
        run: find . -type f | head -80

      - name: Deploy to FTP
        uses: SamKirkland/FTP-Deploy-Action@v4.3.6
        with:
          server: ${{ secrets.FTP_SERVER }}
          username: ${{ secrets.FTP_USERNAME }}
          password: ${{ secrets.FTP_PASSWORD }}
          server-dir: ${{ secrets.FTP_SERVER_DIR }}
          state-name: backend/.ftp-deploy-sync-state.json
          protocol: ftp
          log-level: verbose
          exclude: |
            .git
            .github
            data/
            data/**
            node_modules
            .gitignore
            PASOS-CONECTAR-GITHUB.md
            conectar-github.ps1
            .cursor
