<!DOCTYPE html>
<!-- Admin v8 - CRM, formularios, buscador, fecha relativa, categorías -->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Panel · Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=8">
</head>
<body>
  <div id="app">
    <!-- Pantalla de login -->
    <main id="login-screen" class="screen login-screen">
      <div class="login-card">
        <div class="login-header">
          <div class="logo">
            <span class="logo-icon">▣</span>
            <span>TV Panel</span>
          </div>
          <p class="login-subtitle">Panel de administración</p>
        </div>
        <form id="login-form" class="login-form" method="post" action="#" autocomplete="on">
          <div class="field">
            <label for="login-usuario">Usuario</label>
            <input type="text" id="login-usuario" name="usuario" autocomplete="username" required>
          </div>
          <div class="field">
            <label for="login-password">Contraseña</label>
            <input type="password" id="login-password" name="password" autocomplete="current-password" required>
          </div>
          <p id="login-error" class="error-msg" hidden></p>
          <button type="submit" class="btn btn-primary btn-block">Entrar</button>
        </form>
      </div>
    </main>

    <!-- Dashboard (post-login) -->
    <div id="dashboard" class="dashboard hidden">
      <aside class="sidebar">
        <div class="sidebar-header">
          <span class="logo-icon">▣</span>
          <span>TV Panel</span>
        </div>
        <nav class="sidebar-nav">
          <div class="nav-group">
            <span class="nav-group-title">Gestión</span>
            <a href="#" class="nav-item active" data-view="productos">
              <span class="nav-icon">📦</span>
              <span>Productos</span>
            </a>
            <a href="#" class="nav-item" data-view="ofertas">
              <span class="nav-icon">🏷️</span>
              <span>Ofertas</span>
            </a>
          </div>
          <div class="nav-group nav-group-administracion" id="nav-group-admin">
            <span class="nav-group-title">Administración</span>
            <a href="#" class="nav-item nav-item-tvs" data-view="tvs">
              <span class="nav-icon">📺</span>
              <span>Televisores</span>
            </a>
            <a href="#" class="nav-item nav-item-usuarios" data-view="usuarios">
              <span class="nav-icon">👥</span>
              <span>Usuarios</span>
            </a>
            <a href="#" class="nav-item nav-item-config" data-view="config" style="display: none;">
              <span class="nav-icon">⚙️</span>
              <span>Configuración</span>
            </a>
          </div>
        </nav>
        <div class="sidebar-footer">
          <button type="button" class="user-profile-trigger" id="user-profile-trigger" aria-label="Mi perfil">
            <span class="user-profile-avatar" aria-hidden="true">🧑</span>
            <span class="user-profile-name" id="user-badge">admin</span>
          </button>
          <a href="#" id="logout-btn" class="nav-item">Cerrar sesión</a>
        </div>
      </aside>
      <main class="content">
        <header class="content-header">
          <h1 id="view-title">Productos</h1>
          <button type="button" id="btn-nuevo" class="btn btn-primary" hidden>+ Nuevo</button>
        </header>
        <div id="view-content" class="view-content"></div>
      </main>
    </div>
  </div>

  <!-- Modal genérico -->
  <div id="modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-title">Editar</h2>
        <button type="button" class="modal-close" id="modal-close" aria-label="Cerrar">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Modal Mi perfil -->
  <div id="profile-modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" id="profile-modal-backdrop"></div>
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="profile-modal-title">Mi perfil</h2>
        <button type="button" class="modal-close" id="profile-modal-close" aria-label="Cerrar">&times;</button>
      </div>
      <div id="profile-modal-body" class="modal-body"></div>
    </div>
  </div>

  <!-- Modal confirmar eliminar -->
  <div id="confirm-modal" class="modal confirm-modal hidden" aria-hidden="true">
    <div class="modal-backdrop" id="confirm-backdrop"></div>
    <div class="modal-box confirm-box">
      <div class="confirm-header">
        <span class="confirm-icon" aria-hidden="true">⚠</span>
        <h2 id="confirm-title">¿Eliminar?</h2>
      </div>
      <p id="confirm-message" class="confirm-message"></p>
      <div class="confirm-footer">
        <button type="button" class="btn btn-ghost" id="confirm-cancel">Cancelar</button>
        <button type="button" class="btn btn-danger" id="confirm-ok">Eliminar</button>
      </div>
    </div>
  </div>

  <script src="app.js?v=8"></script>
</body>
</html>
