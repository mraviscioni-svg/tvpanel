<!DOCTYPE html>
<!-- Admin build v5 - formularios, buscador y categorías desde listado -->
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TV Panel · Admin</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css?v=5">
</head>
<body>
  <div id="app">
    <!-- Pantalla de login -->
    <main id="login-screen" class="screen login-screen">
      <div class="login-card">
        <div class="login-header">
          <div class="logo">
            <span class="logo-icon">▣</span>
            <span>TV Panel</span>
          </div>
          <p class="login-subtitle">Panel de administración</p>
        </div>
        <form id="login-form" class="login-form" method="post" action="#" autocomplete="on">
          <div class="field">
            <label for="login-usuario">Usuario</label>
            <input type="text" id="login-usuario" name="usuario" autocomplete="username" required>
          </div>
          <div class="field">
            <label for="login-password">Contraseña</label>
            <input type="password" id="login-password" name="password" autocomplete="current-password" required>
          </div>
          <p id="login-error" class="error-msg" hidden></p>
          <button type="submit" class="btn btn-primary btn-block">Entrar</button>
        </form>
      </div>
    </main>

    <!-- Dashboard (post-login) -->
    <div id="dashboard" class="dashboard hidden">
      <aside class="sidebar">
        <div class="sidebar-header">
          <span class="logo-icon">▣</span>
          <span>TV Panel</span>
        </div>
        <nav class="sidebar-nav">
          <a href="#" class="nav-item active" data-view="productos">
            <span class="nav-icon">📦</span>
            <span>Productos</span>
          </a>
          <a href="#" class="nav-item" data-view="ofertas">
            <span class="nav-icon">🏷️</span>
            <span>Ofertas</span>
          </a>
          <a href="#" class="nav-item" data-view="tvs">
            <span class="nav-icon">📺</span>
            <span>Televisores</span>
          </a>
          <a href="#" class="nav-item" data-view="usuarios">
            <span class="nav-icon">👤</span>
            <span>Usuarios</span>
          </a>
        </nav>
        <div class="sidebar-footer">
          <span class="user-badge" id="user-badge">admin</span>
          <a href="#" id="logout-btn" class="nav-item">Cerrar sesión</a>
        </div>
      </aside>
      <main class="content">
        <header class="content-header">
          <h1 id="view-title">Productos</h1>
          <button type="button" id="btn-nuevo" class="btn btn-primary" hidden>+ Nuevo</button>
        </header>
        <div id="view-content" class="view-content"></div>
      </main>
    </div>
  </div>

  <!-- Modal genérico -->
  <div id="modal" class="modal hidden" aria-hidden="true">
    <div class="modal-backdrop" id="modal-backdrop"></div>
    <div class="modal-box">
      <div class="modal-header">
        <h2 id="modal-title">Editar</h2>
        <button type="button" class="modal-close" id="modal-close" aria-label="Cerrar">&times;</button>
      </div>
      <div id="modal-body" class="modal-body"></div>
    </div>
  </div>

  <script src="app.js?v=5"></script>
</body>
</html>
